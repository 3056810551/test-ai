<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园旧书交易站</title>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              parchment: "#f5ecdc",
              paper: "#fffaf0",
              pine: "#1f4d3d",
              pineSoft: "#326855",
              ember: "#c76837",
              ink: "#2b2117",
              mist: "#ece4d4",
            },
            boxShadow: {
              card: "0 18px 45px rgba(43, 33, 23, 0.12)",
              float: "0 12px 26px rgba(31, 77, 61, 0.18)",
            },
            borderRadius: {
              paper: "28px",
            },
            fontFamily: {
              display: ["Georgia", "Cambria", '"Songti SC"', "serif"],
              body: ['"Segoe UI"', '"PingFang SC"', '"Hiragino Sans GB"', "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-parchment font-body text-ink">
    <div class="page-grain"></div>
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>

    <div class="relative mx-auto flex min-h-screen max-w-[1600px] flex-col lg:flex-row">
      <aside class="border-b border-black/5 bg-paper/85 px-6 py-6 backdrop-blur lg:min-h-screen lg:w-[290px] lg:border-b-0 lg:border-r">
        <div class="sticky top-0 space-y-6">
          <div class="rounded-paper border border-black/5 bg-white/80 p-5 shadow-card">
            <p class="font-display text-2xl text-pine">校园旧书交易站</p>
            <p class="mt-2 text-sm leading-6 text-ink/70">
              旧书从公告栏走下来，变成一个真正能下单、发货、评价的演示前端。
            </p>
          </div>

          <nav class="space-y-2" id="main-nav">
            <a class="nav-link" href="#/">首页</a>
            <a class="nav-link" href="#/books">图书广场</a>
            <a class="nav-link" href="#/books/new">发布图书</a>
            <a class="nav-link" href="#/books/mine">我的图书</a>
            <a class="nav-link" href="#/favorites">我的收藏</a>
            <a class="nav-link" href="#/cart">我的购物车</a>
            <a class="nav-link" href="#/orders">我的订单</a>
            <a class="nav-link" href="#/me">我的资料</a>
          </nav>

          <div class="rounded-paper border border-black/5 bg-pine px-5 py-4 text-paper shadow-float">
            <p class="text-xs uppercase tracking-[0.2em] text-paper/70">会话状态</p>
            <div class="mt-3 space-y-2">
              <p class="text-sm" id="auth-status">未登录</p>
              <p class="text-xs text-paper/70" id="api-status">API Base: /</p>
            </div>
            <div class="mt-4 flex gap-2">
              <a
                href="#/login"
                id="auth-entry-link"
                class="inline-flex items-center rounded-full bg-paper px-4 py-2 text-sm font-medium text-pine transition hover:-translate-y-0.5"
              >
                去登录
              </a>
              <button
                id="logout-btn"
                class="hidden rounded-full border border-paper/30 px-4 py-2 text-sm text-paper transition hover:bg-white/10"
                type="button"
              >
                退出
              </button>
            </div>
          </div>
        </div>
      </aside>

      <div class="flex min-h-screen flex-1 flex-col">
        <header class="border-b border-black/5 bg-white/55 px-6 py-5 backdrop-blur">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.3em] text-ink/45">Campus Second-hand Books</p>
              <h1 class="mt-2 font-display text-3xl text-pine" id="header-title">校园旧书交易站</h1>
              <p class="mt-2 max-w-2xl text-sm leading-6 text-ink/70" id="header-subtitle">
                基于当前 FastAPI 后端的纯静态前端，页面与接口尽量一一对应。
              </p>
            </div>
            <div class="flex flex-wrap gap-3">
              <a class="pill-link" href="/docs" target="_blank" rel="noreferrer">Swagger 文档</a>
              <a class="pill-link" href="#/login">切换账号</a>
            </div>
          </div>
        </header>

        <main class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
          <div id="app"></div>
        </main>
      </div>
    </div>

    <div
      id="toast"
      class="pointer-events-none fixed right-4 top-4 z-50 hidden max-w-sm rounded-2xl border border-black/5 bg-white px-4 py-3 text-sm shadow-card"
    ></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
